<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>TaskOrbit</title>
  </head>
  <body>
    <header>
      <h1>Workflows</h1>
      <div class="actions">
        <button id="newBtn" class="btn btn-primary" title="Create a new workflow">+ New</button>
        <button id="optionsBtn" class="btn" title="Open full editor">Manage</button>
      </div>
    </header>

    <div id="recordingBanner" class="banner hidden">
      <span id="recordingText">Recording...</span>
      <button id="stopRecBtn" class="btn btn-danger">Stop &amp; Save</button>
    </div>

    <ul id="list" class="list"></ul>

    <p id="empty" class="empty hidden">
      No workflows yet. Click <strong>+ New</strong> to create one.
    </p>

    <div id="status" class="status"></div>

    <div id="varPrompt" class="banner hidden" style="flex-direction: column; align-items: stretch; background: var(--bg-alt); color: var(--text-color); border: 1px solid var(--border-color); padding: 10px; margin: 10px; border-radius: 4px;">
      <h3 style="margin-top:0; font-size: 14px;">Run Variables</h3>
      <div id="varInputs" style="display: flex; flex-direction: column; gap: 8px;"></div>
      <div class="actions" style="margin-top: 10px; justify-content: flex-end;">
        <button id="varCancelBtn" class="btn btn-sm">Cancel</button>
        <button id="varRunBtn" class="btn btn-primary btn-sm">Confirm Run</button>
      </div>
    </div>

    <div id="debugPanel" class="hidden" style="display: flex; flex-direction: column; background: #fffbeb; color: #78350f; border: 1px solid #fcd34d; padding: 12px; margin: 10px; border-radius: 8px; font-size: 13px; gap: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
      <div style="display: flex; align-items: center; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #fde68a; padding-bottom: 6px; margin-bottom: 4px;">
        <span>🐛 Workflow Debugger</span>
        <span id="debugWorkflowName" style="font-size: 11px; opacity: 0.8;"></span>
      </div>
      <div>
        <strong>Current Step:</strong> <span id="debugStepInfo">None</span>
      </div>
      <div id="debugVarInspector" style="max-height: 120px; overflow-y: auto; border: 1px solid #fde68a; border-radius: 4px; background: #ffffff;">
        <table style="width: 100%; border-collapse: collapse; font-size: 11px; text-align: left;">
          <thead>
            <tr style="background: #fef3c7; border-bottom: 1px solid #fde68a;">
              <th style="padding: 4px 6px;">Variable</th>
              <th style="padding: 4px 6px;">Value</th>
            </tr>
          </thead>
          <tbody id="debugVarBody">
            <tr>
              <td colspan="2" style="padding: 6px; text-align: center; color: #92400e;">No variables defined</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div style="display: flex; gap: 6px; margin-top: 4px;">
        <button id="debugNextBtn" class="btn btn-sm btn-primary" style="flex: 1; font-weight: bold; background: #d97706; border-color: #d97706;">▶ Next Step</button>
        <button id="debugRunAllBtn" class="btn btn-sm" style="flex: 1; font-weight: bold;">⏭ Run All</button>
        <button id="debugStopBtn" class="btn btn-sm btn-danger" style="flex: 1; font-weight: bold;">⏹ Stop</button>
      </div>
    </div>

    <div id="emergencyStopContainer" class="hidden" style="padding: 10px; text-align: center; border-top: 1px solid var(--border-color);">
      <button id="emergencyStopBtn" class="btn btn-danger" style="width: 100%; font-weight: bold;">■ Stop Workflow</button>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
